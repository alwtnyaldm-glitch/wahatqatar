<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>تفاصيل المنتج - مياه واحة قطر</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    .product-detail-page {
      max-width: 980px;
      margin: 32px auto;
      padding: 24px;
    }
    .product-detail-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 0;
    }
    .product-detail-image {
      width: 100%;
      height: 100%;
      min-height: 420px;
      object-fit: cover;
      background: #f7f7f7;
    }
    .product-detail-info {
      padding: 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }
    .product-detail-info h2 {
      margin: 0;
      font-size: 1.8rem;
      color: var(--text-primary);
    }
    .product-detail-price {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
    }
    .product-detail-description {
      color: var(--text-secondary);
      line-height: 1.8;
      font-size: 1rem;
      margin: 0;
    }
    .quantity-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .quantity-row label {
      font-weight: 600;
      color: var(--text-primary);
    }
    .quantity-controls {
      display: flex;
      align-items: center;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      background: #fff;
    }
    .quantity-btn {
      width: 42px;
      height: 42px;
      border: none;
      background: #f8fafc;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text-primary);
    }
    .quantity-input {
      width: 56px;
      text-align: center;
      border: none;
      outline: none;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      background: #fff;
    }
    .btn-large {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
    }
    @media (max-width: 900px) {
      .product-detail-card {
        grid-template-columns: 1fr;
      }
      .product-detail-image {
        min-height: 320px;
      }
    }
    /* 1. إجبار الصفحة كاملة على أخذ ارتفاع الشاشة */
body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    margin: 0;
}

/* 2. دفع المحتوى الذي يليه للأسفل */
.main-content {
    flex: 1; /* هذا هو السطر الأهم */
}

/* 3. تنسيق الفوتر */
.footer {
    flex-shrink: 0; /* منع الفوتر من الانكماش */
    text-align: center;
    padding: 20px;
    color: white;
}

  </style>
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <div class="logo">
        <div class="logo-icon">💧</div>
        <div class="logo-text">
          <h1>مياه واحة قطر</h1>
          <span>qatar Oasis Water</span>
        </div>
      </div>
    </div>
  </header>

  <main class="product-detail-page">
    <div class="product-detail-card" id="productDetailCard">
      <div class="loading">
        <div class="spinner"></div>
        <p>جاري تحميل المنتج...</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2024 مياه واحة قطر - جميع الحقوق محفوظة 💧</p>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      trackPageChange('product');

      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      const detailCard = document.getElementById('productDetailCard');

      if (!productId) {
        detailCard.innerHTML = `
          <div style="padding:40px;text-align:center;">
            <p>لم يتم تحديد منتج.</p>
            <a href="../index.html" class="btn btn-primary">العودة للصفحة الرئيسية</a>
          </div>
        `;
        return;
      }

      const product = await fetchProductById(productId);
      if (!product) {
        detailCard.innerHTML = `
          <div style="padding:40px;text-align:center;">
            <p>تعذر العثور على المنتج المطلوب.</p>
            <a href="../index.html" class="btn btn-primary">العودة للصفحة الرئيسية</a>
          </div>
        `;
        return;
      }

      localStorage.setItem('selected_product', product.id);
      localStorage.setItem('selected_product_data', JSON.stringify(product));
      localStorage.setItem('selected_quantity', '1');

      detailCard.innerHTML = `
        <img src="${product.image_url || 'https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=600'}"
             alt="${product.name_ar}"
             class="product-detail-image"
             onerror="this.src='https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=600'">
        <div class="product-detail-info">
          <h2>${product.name_ar}</h2>
          <p class="product-detail-description">${product.description || 'لا توجد وصف متاح لهذا المنتج.'}</p>
          <div class="product-detail-price">${Number(product.price || 0).toFixed(2)} ر.ق</div>
          <div class="quantity-row">
            <label for="quantityInput">الكمية</label>
            <div class="quantity-controls">
              <button type="button" class="quantity-btn" onclick="changeQuantity(-1)">−</button>
              <input type="number" id="quantityInput" class="quantity-input" min="1" max="10" value="1">
              <button type="button" class="quantity-btn" onclick="changeQuantity(1)">+</button>
            </div>
          </div>
          <button class="btn btn-primary btn-large" onclick="goToDelivery()">إضافة عنوان التوصيل</button>
        </div>
      `;

      const quantityInput = document.getElementById('quantityInput');
      quantityInput.addEventListener('input', () => {
        let value = parseInt(quantityInput.value, 10);
        if (isNaN(value) || value < 1) value = 1;
        if (value > 10) value = 10;
        quantityInput.value = value;
        localStorage.setItem('selected_quantity', String(value));
      });
    });

    async function fetchProductById(id) {
      try {
        const response = await fetch(`${SERVER_URL}/api/products/${id}`);
        const data = await response.json();
        return data.product || null;
      } catch (error) {
        console.error('Error fetching product by id:', error);
        return null;
      }
    }

    function changeQuantity(delta) {
      const quantityInput = document.getElementById('quantityInput');
      if (!quantityInput) return;
      let value = parseInt(quantityInput.value, 10) || 1;
      value = Math.min(10, Math.max(1, value + delta));
      quantityInput.value = value;
      localStorage.setItem('selected_quantity', String(value));
    }

    function goToDelivery() {
      const quantityInput = document.getElementById('quantityInput');
      if (quantityInput) {
        let value = parseInt(quantityInput.value, 10);
        if (isNaN(value) || value < 1) value = 1;
        if (value > 10) value = 10;
        localStorage.setItem('selected_quantity', String(value));
      }
      window.location.href = 'delivery.html';
    }
  </script>
</body>
</html>
