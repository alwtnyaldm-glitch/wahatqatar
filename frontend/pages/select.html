<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>اختيار الدفع - مياه واحة قطر</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    .product-detail-page {
      max-width: 980px;
      margin: 32px auto;
      padding: 24px;
    }
    .product-detail-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 0;
    }
    .product-detail-image {
      width: 100%;
      height: 100%;
      min-height: 420px;
      object-fit: cover;
      background: #f7f7f7;
    }
    .product-detail-info {
      padding: 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }
    .product-detail-info h2 {
      margin: 0;
      font-size: 1.8rem;
      color: var(--text-primary);
    }
    .product-detail-price {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary);
    }
    .product-detail-description {
      color: var(--text-secondary);
      line-height: 1.8;
      font-size: 1rem;
      margin: 0;
    }
    .quantity-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .quantity-row label {
      font-weight: 600;
      color: var(--text-primary);
    }
    .quantity-controls {
      display: flex;
      align-items: center;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      background: #fff;
    }
    .quantity-btn {
      width: 42px;
      height: 42px;
      border: none;
      background: #f8fafc;
      cursor: pointer;
      font-size: 0.5rem;
      color: var(--text-primary);
    }
    .quantity-input {
      width: 56px;
      text-align: center;
      border: none;
      outline: none;
      font-size: 0.5rem;
      font-weight: 600;
      color: var(--text-primary);
      background: #fff;
    }
    .btn-large {
      width: 100%;
      padding: 10px;
      font-size: 0.5rem;
      font-weight: 700;
    }
    @media (max-width: 900px) {
      .product-detail-card {
        grid-template-columns: 1fr;
      }
      .product-detail-image {
        min-height: 120px;
      }
    }

    .payment-selection {
    text-align: center;
    padding: 20px;
    font-family: sans-serif;
}

.payment-options {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 10px;
}

.option-card {
    flex: 1;
    max-width: 250px;
    padding: 10px;
    border: 2px solid #3b83f67a; /* لون الحدود */
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    background-color: #1e293bc8; /* لون الخلفية الداكن */
    color: white;
}

.option-card:hover {
    background-color: #3b82f6;
    transform: translateY(-5px);
}

/* تنسيق للهاتف */
@media (max-width: 600px) {
    .payment-options {
        flex-direction: column;
        align-items: center;
    }
    .option-card {
        width: 100%;
        max-width: 100%;
    }
}
.payment-options{
    padding: 5px;
    font-size: 10px;
}

    html {
        height: 100%;
    }
    
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .product-detail-page {
        flex: 1; 
        max-width: 980px;
        margin: 32px auto;
        padding: 24px;
        width: 90%; 
    }

    .footer {
        flex-shrink: 0;
        text-align: center;
        padding: 20px;
        color: white;
        margin-top: auto; 
    }
.payment-selection{
    margin-top: 150px;
}
 
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <div class="logo">
        <div class="logo-icon">💧</div>
        <div class="logo-text">
          <h1>مياه واحة قطر</h1>
          <span>qatar Oasis Water</span>
        </div>
      </div>
    </div>
  </header>

<div class="payment-selection">
    <h2>يرجى اختيار طريقة الدفع</h2>
    
    <div class="payment-options">
        <button type="button" class="option-card" onclick="selectPayment('card')">
            الدفع الآن
        </button>

        <button type="button" class="option-card" onclick="selectPayment('cash')">
            الدفع عند الاستلام
        </button>
    </div>
</div>

  <footer class="footer">
    <div class="container">
      <p>© 2024 مياه واحة قطر - جميع الحقوق محفوظة 💧</p>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    function selectPayment(method) {
        localStorage.setItem('payment_method', method);
        window.location.href = 'payment.html';
    }
</script>

</body>
</html>
